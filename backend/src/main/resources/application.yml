server:
  port: ${PORT:8080}

spring:
  datasource:
    url: ${DATABASE_URL:jdbc:mysql://interchange.proxy.rlwy.net:23108/railway?useSSL=true&serverTimezone=UTC&allowPublicKeyRetrieval=true}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    database-platform: org.hibernate.dialect.MySQLDialect

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${CLERK_ISSUER_URI:https://placeholder.clerk.accounts.dev}

app:
  cors:
    allowed-origins: ${FRONTEND_URL:http://localhost:3000}
  dev-mode: false

logging:
  level:
    com.skillbridge: INFO
    org.springframework.security: WARN

---
spring:
  config:
    activate:
      on-profile: dev
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: https://placeholder.clerk.accounts.dev

app:
  dev-mode: true
  cors:
    allowed-origins: http://localhost:3000

logging:
  level:
    com.skillbridge: DEBUG
