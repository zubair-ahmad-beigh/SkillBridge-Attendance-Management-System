server:
  port: ${PORT:8080}

spring:
  datasource:
    url: "${DATABASE_URL:jdbc:mysql://interchange.proxy.rlwy.net:23108/railway?useSSL=true&requireSSL=true&verifyServerCertificate=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&connectTimeout=30000&socketTimeout=60000}"
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      connection-timeout: 30000
      maximum-pool-size: 5
      minimum-idle: 1
      idle-timeout: 300000
      max-lifetime: 600000
      connection-test-query: SELECT 1
      keepalive-time: 60000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    database-platform: org.hibernate.dialect.MySQLDialect
    properties:
      hibernate:
        format_sql: false
        jdbc:
          time_zone: UTC

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${CLERK_ISSUER_URI:https://placeholder.clerk.accounts.dev}

app:
  cors:
    allowed-origins: "${FRONTEND_URL:http://localhost:3000}"
  dev-mode: false

logging:
  level:
    com.skillbridge: DEBUG
    org.springframework.security: WARN
    com.zaxxer.hikari: DEBUG
    org.hibernate.SQL: DEBUG

---
spring:
  config:
    activate:
      on-profile: dev
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: https://placeholder.clerk.accounts.dev

app:
  dev-mode: true
  cors:
    allowed-origins: "http://localhost:3000"

logging:
  level:
    com.skillbridge: DEBUG
    com.zaxxer.hikari: DEBUG
